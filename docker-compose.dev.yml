version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: refinery_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: refinery
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: refinery_adminer
    restart: unless-stopped
    ports:
      - 8080:8080
    depends_on:
      - postgres

volumes:
  postgres_data:
